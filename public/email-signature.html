<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }
        .signature {
            max-width: 500px;
            margin: 20px 0;
            padding: 16px 0;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #262626;
            line-height: 1.6;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .name-title {
            flex: 1;
        }
        .name {
            font-weight: 600;
            color: #000;
            font-size: 14px;
            margin: 0;
            display: block;
        }
        .title {
            font-size: 12px;
            color: #666;
            margin: 2px 0 0 0;
            display: block;
        }
        .contact {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .contact a {
            color: #0066cc;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .contact a:hover {
            text-decoration: underline;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .divider {
            color: #e0e0e0;
        }
        .company {
            font-weight: 500;
            color: #000;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .tagline {
            font-size: 11px;
            color: #999;
            font-style: italic;
        }
        .social {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .social a {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            background: #f0f0f0;
            text-decoration: none;
            color: #666;
            font-size: 11px;
            text-align: center;
            line-height: 20px;
            transition: background 0.2s;
        }
        .social a:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="signature">
    <div class="header">
        <div class="logo">
            <img src="https://myhorizon.ai/myhorizon-logo-icon.png" alt="MH" width="40" height="40" style="border-radius: 50%;">
        </div>
        <div class="name-title">
            <span class="name">[Your Name]</span>
            <span class="title">[Your Title]</span>
        </div>
    </div>
    
    <div class="company">MyHorizon AI</div>
    <div class="tagline">AI Systems & Automation for Business</div>
    
    <div class="contact">
        <div class="contact-item">
            <span>📧</span>
            <a href="mailto:[your-email]@myhorizon.ai">[your-email]@myhorizon.ai</a>
        </div>
        <span class="divider">|</span>
        <div class="contact-item">
            <span>🌐</span>
            <a href="https://myhorizon.ai" target="_blank">myhorizon.ai</a>
        </div>
    </div>
    
    <div class="social" style="margin-top: 10px;">
        <a href="https://x.com/SynthiosAI" target="_blank" title="X/Twitter">𝕏</a>
        <a href="https://www.instagram.com/myhorizon.ai" target="_blank" title="Instagram">📷</a>
        <a href="https://linkedin.com/company/myhorizon" target="_blank" title="LinkedIn">in</a>
    </div>
</div>

</body>
</html>
